<section class="lv2-page" aria-label="레벨 2 리듬 기억 게임">
  <div class="lv2-status" id="lv2Status">START 버튼을 누르면 시작합니다.</div>

  <ul id="circlesWrap" class="circles-wrap" aria-label="터치 원 영역"></ul>

  <div class="lv2-ready" id="lv2Ready">
    <button type="button" id="lv2StartButton" class="lv2-action-button">START</button>
    <p>원이 나타나는 위치와 순서를 기억한 뒤, 다시 나타날 때 안쪽 원을 터치하세요.</p>
  </div>

  <div class="lv2-result" id="lv2Result" hidden>
    <div class="lv2-result__buttons">
      <button type="button" id="lv2NextButton" class="lv2-action-button" hidden>NEXT</button>
      <button type="button" id="lv2RetryButton" class="lv2-action-button" hidden>RETRY</button>
      <button type="button" id="lv2HomeButton" class="lv2-action-button is-home" hidden>HOME</button>
    </div>
  </div>
</section>
