name: Deploy Front Local

on:
  workflow_dispatch:

concurrency:
  group: myapp-front-local-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout front repository
        uses: actions/checkout@v4

      - name: Build front Docker image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          docker build -t "myapp-front:${IMAGE_TAG}" .
          docker tag "myapp-front:${IMAGE_TAG}" myapp-front:latest

      - name: Deploy front with new image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          cd /home/um/myApp-Infra
          chmod +x scripts/*.sh
          IMAGE_OVERRIDE="myapp-front:${IMAGE_TAG}" ./scripts/deploy-front.sh